<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday Helly!</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="light light-1"></div>
    <div class="light light-2"></div>
    
    <div class="container">
      <div class="stars"></div>
      <div class="card">
        <div class="decorations">
          <div class="balloon balloon-1"></div>
          <div class="balloon balloon-2"></div>
          <div class="balloon balloon-3"></div>
          <div class="balloon balloon-4"></div>
        </div>
        <div class="decorations-container">
          <div class="cake-icon">🎂</div>
        </div>
        <h1 class="title">Happy<br />Birthday<br />Helly!</h1>
        <p class="message">
          Wishing you a day filled with joy, laughter, and unforgettable
          moments, Helly Thakkar. May all your dreams come true!
        </p>
        <button class="celebrate-btn" id="celebrateBtn">Let's Celebrate!</button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
